name: ClaudeRemote

options:
  bundleIdPrefix: com.clauderemote
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: YES

targets:
  ClaudeRemote:
    type: application
    platform: macOS
    sources:
      - path: ClaudeRemote
        excludes:
          - "Supporting Files/Info.plist"
          - "Resources/**"
    resources:
      - path: ClaudeRemote/Assets.xcassets
    postCompileScripts:
      - name: Copy Node and Service
        script: |
          set -e
          DEST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          mkdir -p "${DEST}"
          cp "${SRCROOT}/ClaudeRemote/Resources/node" "${DEST}/node"
          chmod +x "${DEST}/node"
          rsync -a --delete "${SRCROOT}/ClaudeRemote/Resources/service/" "${DEST}/service/"
    settings:
      base:
        PRODUCT_NAME: Arcway
        PRODUCT_BUNDLE_IDENTIFIER: com.clauderemote.app
        INFOPLIST_FILE: "ClaudeRemote/Supporting Files/Info.plist"
        GENERATE_INFOPLIST_FILE: NO
